name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy runs at a time; cancel in-progress for PRs but not for main
concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # ── Build ────────────────────────────────────────────────────────────────
  build:
    name: Build games
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Type-check shared/math-engine
        working-directory: shared/math-engine
        run: npm run typecheck

      - name: Test shared/math-engine
        working-directory: shared/math-engine
        run: npm run test:run

      - name: Lint missile-command-math
        working-directory: games/missile-command-math
        run: npm run lint

      - name: Type-check missile-command-math
        working-directory: games/missile-command-math
        run: npm run typecheck

      - name: Test missile-command-math (unit)
        working-directory: games/missile-command-math
        run: npm run test:run

      - name: Build missile-command-math
        working-directory: games/missile-command-math
        run: npm run build

      - name: Bundle size check (2 MB limit)
        working-directory: games/missile-command-math
        run: |
          BUNDLE_KB=$(du -sk dist | cut -f1)
          echo "Bundle size: ${BUNDLE_KB} KB"
          if [ "$BUNDLE_KB" -gt 2048 ]; then
            echo "ERROR: Bundle exceeds 2 MB limit (${BUNDLE_KB} KB)"
            exit 1
          fi

      - name: Assemble GitHub Pages artifact
        run: |
          mkdir -p _site/missile-command-math
          cp -r games/missile-command-math/dist/. _site/missile-command-math/
          # Root index redirects to the game
          cat > _site/index.html << 'EOF'
          <!DOCTYPE html>
          <html><head><meta charset="UTF-8">
          <meta http-equiv="refresh" content="0; url=missile-command-math/">
          <title>Arcade Swarm</title></head>
          <body><a href="missile-command-math/">Missile Command Math</a></body>
          </html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  # ── Deploy (main branch only) ─────────────────────────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
