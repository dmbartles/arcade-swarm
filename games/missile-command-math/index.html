<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0a0a0f" />
    <meta name="description" content="Missile Command Math — an educational arcade game for grades 3–5" />
    <!-- Prevent iOS from treating phone numbers as links -->
    <meta name="format-detection" content="telephone=no" />
    <!-- Prevent flash of unstyled content -->
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        background: #C8B8DC;
        width: 100%;
        height: 100%;
        overflow: hidden;
        touch-action: none;
      }
      #game-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }
      /* CSS handles centering; Phaser handles scaling via FIT mode.
         !important overrides inline styles Phaser's Scale Manager injects. */
      canvas {
        display: block !important;
        position: absolute !important;
        top: 50% !important;
        left: 50% !important;
        /* Shift down 9.375% so the bezel center (y=260 of 640) hits the viewport center */
        transform: translate(-50%, calc(-50% + 9.375%)) !important;
        image-rendering: pixelated;
        image-rendering: crisp-edges;
      }
    </style>
    <title>Missile Command Math</title>
  </head>
  <body>
    <div id="game-container"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
